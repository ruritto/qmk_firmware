<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>夏休み宿題管理</title>
<style>
:root{
  --bg:#F5F1E6; --card:#FFFDF7; --ink:#2A2620; --muted:#7A7264; --line:#E3DCC9;
  --school:#B8420C; --exam:#2B4570; --deadline:#C1440E; --juku:#6E6A56;
  --school-bg:#F7E3D4; --exam-bg:#DEE5F0; --deadline-bg:#F8DCD2; --juku-bg:#E9E7DE;
  --accent:#2B4570; --ok:#3E7C4F; --ok-bg:#E2ECDF; --shadow:0 1px 3px rgba(42,38,32,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#201D18; --card:#2A2721; --ink:#F0EBDD; --muted:#A89F8D; --line:#3B372E;
    --school:#E8703A; --exam:#8FA9D6; --deadline:#E8654A; --juku:#A8A28C;
    --school-bg:#3A2A1F; --exam-bg:#232B3A; --deadline-bg:#3A241E; --juku-bg:#2E2C25;
    --accent:#8FA9D6; --ok:#7FBF8E; --ok-bg:#26312A; --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#201D18; --card:#2A2721; --ink:#F0EBDD; --muted:#A89F8D; --line:#3B372E;
  --school:#E8703A; --exam:#8FA9D6; --deadline:#E8654A; --juku:#A8A28C;
  --school-bg:#3A2A1F; --exam-bg:#232B3A; --deadline-bg:#3A241E; --juku-bg:#2E2C25;
  --accent:#8FA9D6; --ok:#7FBF8E; --ok-bg:#26312A; --shadow:0 1px 3px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#F5F1E6; --card:#FFFDF7; --ink:#2A2620; --muted:#7A7264; --line:#E3DCC9;
  --school:#B8420C; --exam:#2B4570; --deadline:#C1440E; --juku:#6E6A56;
  --school-bg:#F7E3D4; --exam-bg:#DEE5F0; --deadline-bg:#F8DCD2; --juku-bg:#E9E7DE;
  --accent:#2B4570; --ok:#3E7C4F; --ok-bg:#E2ECDF; --shadow:0 1px 3px rgba(42,38,32,.08);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;
  font-size:15px; line-height:1.55;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
button{font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer;}
.wrap{max-width:720px; margin:0 auto; padding:0 12px;}
/* ---- top header ---- */
.top{position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line);}
.top-inner{max-width:720px; margin:0 auto; padding:10px 14px; display:flex; align-items:center; gap:10px;}
.top h1{font-size:16px; font-weight:700; margin:0; letter-spacing:.04em;}
.top .period{font-size:11px; color:var(--muted); margin-top:1px;}
.overall-chip{margin-left:auto; display:flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:4px 12px 4px 6px; box-shadow:var(--shadow);}
.overall-chip .pct{font-weight:700; font-variant-numeric:tabular-nums; font-size:14px;}
.overall-chip .lbl{font-size:10px; color:var(--muted);}
/* ---- tabs ---- */
.tabs{position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--card); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom);}
.tabs-inner{max-width:720px; margin:0 auto; display:grid; grid-template-columns:repeat(5,1fr);}
.tab{display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0 7px; font-size:10.5px; color:var(--muted); border-top:2px solid transparent;}
.tab svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
.tab.active{color:var(--accent); border-top-color:var(--accent); font-weight:700;}
/* ---- common ---- */
main{padding-top:12px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:12px;}
.section-h{font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.08em; margin:0 0 8px;}
.nav-row{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
.nav-btn{width:40px; height:40px; border-radius:10px; background:var(--card); border:1px solid var(--line); font-size:16px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);}
.nav-btn:active{transform:scale(.94);}
.nav-title{flex:1; text-align:center; font-weight:700;}
.nav-title .sub{display:block; font-size:11px; font-weight:400; color:var(--muted);}
.today-btn{font-size:12px; padding:6px 10px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--accent); font-weight:700;}
.badge{display:inline-block; font-size:10.5px; font-weight:700; padding:1px 8px; border-radius:999px; vertical-align:1px;}
.badge.excluded{background:var(--juku-bg); color:var(--juku); border:1px dashed var(--juku);}
.chip{display:inline-block; font-size:11.5px; font-weight:700; padding:2px 10px; border-radius:999px; background:var(--juku-bg); color:var(--juku);}
.minutes{font-size:11px; color:var(--muted); white-space:nowrap;}
.empty{color:var(--muted); font-size:13px; text-align:center; padding:18px 0;}
/* ---- task rows ---- */
.task{display:flex; align-items:flex-start; gap:10px; padding:9px 8px 9px 10px; border-radius:10px; border-left:4px solid var(--c,var(--line)); background:var(--cbg,transparent); margin-bottom:6px; width:100%; text-align:left;}
.task:last-child{margin-bottom:0;}
.task.cat-school{--c:var(--school); --cbg:var(--school-bg);}
.task.cat-exam{--c:var(--exam); --cbg:var(--exam-bg);}
.task.cat-deadline{--c:var(--deadline); --cbg:var(--deadline-bg);}
.task.cat-juku{--c:var(--juku); --cbg:var(--juku-bg);}
.task.cat-info{--c:var(--muted); --cbg:transparent; border:1px dashed var(--line); border-left:4px solid var(--muted);}
.cb{flex:none; width:24px; height:24px; margin-top:1px; border-radius:7px; border:2px solid var(--c,var(--muted)); background:var(--card); display:flex; align-items:center; justify-content:center;}
.cb svg{width:15px; height:15px; stroke:#fff; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:0;}
.task.done .cb{background:var(--c); }
.task.done .cb svg{opacity:1;}
.task.done .t-title{text-decoration:line-through; opacity:.55;}
.t-body{flex:1; min-width:0;}
.t-title{font-size:14px; font-weight:600; overflow-wrap:anywhere;}
.t-meta{font-size:11px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; margin-top:2px;}
.t-cat{font-weight:700; color:var(--c);}
.due-chip{flex:none; font-size:10.5px; font-weight:700; color:#fff; background:var(--deadline); border-radius:999px; padding:2px 8px; margin-top:3px; white-space:nowrap;}
.task.urgent{outline:2px solid var(--deadline); outline-offset:-1px;}
/* ---- week view ---- */
.wk-bar{height:8px; border-radius:999px; background:var(--line); overflow:hidden; margin-top:4px;}
.wk-bar i{display:block; height:100%; background:var(--ok); border-radius:999px; transition:width .25s;}
.day-card-h{display:flex; align-items:center; gap:8px; width:100%; text-align:left; padding:2px 0 8px; font-weight:700;}
.day-card-h .dow{font-size:12px; color:var(--muted); font-weight:400;}
.day-card-h .arrow{margin-left:auto; color:var(--muted); font-size:12px; font-weight:400;}
.day-card-h.sun .dnum{color:var(--deadline);}
.day-card-h.sat .dnum{color:var(--exam);}
.card.is-excluded{background:repeating-linear-gradient(-45deg, var(--card), var(--card) 8px, var(--bg) 8px, var(--bg) 10px);}
.deadline-banner{display:flex; gap:8px; align-items:flex-start; background:var(--deadline-bg); border-left:4px solid var(--deadline); border-radius:10px; padding:8px 10px; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--ink);}
.deadline-banner .flag{flex:none;}
/* ---- schedule / praise / rest-week / add-form ---- */
.hidden{display:none !important;}
.sched-row{display:flex; align-items:center; gap:8px; padding:7px 0; font-size:13.5px; border-bottom:1px dashed var(--line);}
.sched-row:last-child{border-bottom:none; padding-bottom:2px;}
.sched-row .time{margin-left:auto; font-variant-numeric:tabular-nums; color:var(--muted); font-weight:700; white-space:nowrap;}
.sched-row b{font-weight:700;}
.chip.club{background:var(--ok-bg); color:var(--ok);}
.praise{background:var(--ok); color:#fff; border-radius:12px; text-align:center; font-size:17px; font-weight:800; padding:14px 12px; margin-bottom:12px; box-shadow:var(--shadow); letter-spacing:.04em;}
.rest-week{margin-top:24px; background:var(--exam-bg); border-color:var(--exam);}
.rest-week .section-h{color:var(--exam);}
.rest-date{font-size:12px; font-weight:700; color:var(--exam); margin:10px 0 4px;}
.task-wrap{display:flex; gap:6px; margin-bottom:6px;}
.task-wrap .task{margin-bottom:0; flex:1;}
.del-btn{flex:none; width:36px; border-radius:10px; border:1px solid var(--line); color:var(--deadline); background:var(--card); font-weight:700; font-size:14px;}
.add-form{display:grid; gap:8px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
.add-form input,.add-form select{font:inherit; padding:9px 10px; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); width:100%;}
.add-form .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.add-form .submit{background:var(--accent); color:#fff; font-weight:700; border-radius:8px; padding:10px;}
/* ---- edit sheet ---- */
.edit-btn{flex:none; width:36px; border-radius:10px; border:1px solid var(--line); color:var(--muted); background:var(--card); font-size:15px;}
.sched-row .edit-btn{width:32px; height:30px; margin-left:8px;}
.chip.plan{background:var(--exam-bg); color:var(--exam);}
.sheet-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50;}
.sheet{position:fixed; left:0; right:0; bottom:0; z-index:51; background:var(--card); border-radius:16px 16px 0 0; padding:16px 16px calc(18px + env(safe-area-inset-bottom)); max-width:720px; margin:0 auto; display:grid; gap:8px; box-shadow:0 -6px 24px rgba(0,0,0,.25);}
.sheet-title{font-weight:700; font-size:15px; overflow-wrap:anywhere;}
.sheet-sub{font-size:12px; color:var(--muted); margin-bottom:2px;}
.sheet-btn{border:1px solid var(--line); border-radius:10px; padding:11px; font-weight:700; background:var(--bg); text-align:center;}
.sheet-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.sheet-btn.danger{color:var(--deadline); border-color:var(--deadline);}
.sheet-move{display:grid; grid-template-columns:1fr auto; gap:8px;}
.sheet-move input{font:inherit; padding:9px 10px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); min-width:0;}
/* ---- filter chips ---- */
.filters{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
.f-chip{font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; border:1.5px solid var(--line); background:var(--card); color:var(--muted);}
.f-chip.active{border-color:var(--accent); color:var(--accent); background:var(--exam-bg);}
/* ---- stats ---- */
.donut-wrap{display:flex; align-items:center; gap:18px;}
.donut-nums .big{font-size:30px; font-weight:800; font-variant-numeric:tabular-nums;}
.donut-nums .small{font-size:12px; color:var(--muted);}
.hbar-row{display:grid; grid-template-columns:minmax(72px,auto) 1fr 44px; gap:8px; align-items:center; margin-bottom:7px; font-size:12.5px;}
.hbar-row .lab{font-weight:600; overflow-wrap:anywhere;}
.hbar-row .val{text-align:right; font-variant-numeric:tabular-nums; color:var(--muted); font-size:12px;}
.hbar{height:10px; border-radius:999px; background:var(--line); overflow:hidden;}
.hbar i{display:block; height:100%; border-radius:999px; background:var(--accent);}
.toggle-row{display:flex; align-items:center; gap:10px; padding:4px 0;}
.toggle-row .desc{font-size:11px; color:var(--muted);}
.switch{flex:none; width:44px; height:26px; border-radius:999px; background:var(--line); position:relative; transition:background .15s;}
.switch i{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:var(--card); box-shadow:var(--shadow); transition:left .15s;}
.switch.on{background:var(--ok);}
.switch.on i{left:21px;}
/* ---- open questions ---- */
.oq{display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px dashed var(--line);}
.oq:last-of-type{border-bottom:none;}
.oq .txt{flex:1; font-size:13px;}
.oq.checked .txt{text-decoration:line-through; opacity:.5;}
.oq .ops{flex:none; display:flex; gap:6px;}
.oq .ops button{font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:2px 8px; background:var(--card);}
.oq-add{margin-top:8px; font-size:12px; font-weight:700; color:var(--accent); border:1px dashed var(--accent); border-radius:8px; padding:6px 12px; width:100%;}
/* ---- log ---- */
.log-note{font-size:11.5px; color:var(--muted); margin-bottom:10px;}
.log-row{display:flex; gap:10px; align-items:flex-start; padding:8px 2px; border-bottom:1px solid var(--line); font-size:13px;}
.log-row:last-child{border-bottom:none;}
.log-when{flex:none; width:86px; font-variant-numeric:tabular-nums; color:var(--muted); font-size:11.5px; padding-top:2px;}
.log-act{flex:none; font-size:10.5px; font-weight:700; border-radius:999px; padding:1px 8px; margin-top:1px;}
.log-act.done{background:var(--ok); color:#fff;}
.log-act.undo{background:none; border:1px solid var(--deadline); color:var(--deadline);}
.log-body{flex:1; min-width:0; overflow-wrap:anywhere;}
.log-body .sub{display:block; font-size:11px; color:var(--muted);}
@media (min-width:600px){
  .week-days{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .week-days .card{margin-bottom:0;}
}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

        category:"juku", subject:r.subject,
        title:`塾復習：${r.subject}（${md}授業分${r.shifted?"・振替":""}）`,
        minutes:null, checkable:true}));
    });
  });
  (state.customTasks||[]).forEach(c=>{
    items.push({id:c.id, date:c.date, weekday:weekdayOf(c.date), kind:"task",
      category:c.category, subject:c.subject, title:c.title, minutes:c.minutes||null,

{

/* ================= helpers ================= */
function parseDate(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtMD(s){ const [,m,d]=s.split("-").map(Number); return `${m}/${d}`; }
function todayStr(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`; }
function daysUntil(dateStr){ return Math.round((parseDate(dateStr)-parseDate(todayStr()))/86400000); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function pct(done,total){ return total===0?0:Math.round(done/total*100); }

function countable(it){ return it.checkable && (state.includeReview || it.kind!=="review"); }
function rate(list){
  const t=list.filter(countable);
  return {done:t.filter(it=>state.completed[it.id]).length, total:t.length};
}
function overallRate(){ return rate(items); }
function weekRate(w){ return rate(items.filter(it=> w.dayIdxs.some(i=>days[i].date===it.date))); }

/* ================= actions ================= */
function toggleItem(id){
  const it = itemById[id]; if(!it || !it.checkable) return;
  const now = new Date().toISOString();
  if(state.completed[id]){
    delete state.completed[id];
    state.log.push({at:now, action:"undo", id, title:it.title, subject:it.subject, taskDate:it.date});
  }else{
    state.completed[id]=true;
    state.log.push({at:now, action:"done", id, title:it.title, subject:it.subject, taskDate:it.date});
  }
  save(); render();
}

function taskRowHTML(it, opts){
  opts = opts||{};
  const done = !!state.completed[it.id];
  const cls = `task cat-${it.category} ${done?"done":""} ${opts.urgent?"urgent":""}`;
  const meta = [];
  meta.push(`<span class="t-cat">${CAT_LABEL[it.category]}</span>`);
  if(it.subject) meta.push(`<span>${esc(it.subject)}</span>`);
  if(opts.showDate) meta.push(`<span>${fmtMD(it.date)}(${it.weekday})</span>`);
  if(it.minutes) meta.push(`<span class="minutes">約${it.minutes}分</span>`);
  if(it.movedFrom) meta.push(`<span>📅 ${fmtMD(it.movedFrom)}から移動</span>`);
  const cb = it.checkable
    ? `<span class="cb" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg></span>`
    : `<span class="cb" style="border-style:dashed; opacity:.45" aria-hidden="true"></span>`;
  let due = "";
  if(opts.dueChip){
    const n = daysUntil(it.date);
    due = `<span class="due-chip">${n<0?`${-n}日超過`:n===0?"今日まで":`あと${n}日`}</span>`;
  }
  const tag = it.checkable?"button":"div";
  const attr = it.checkable?` data-item="${it.id}" role="checkbox" aria-checked="${done}"`:"";
  const row = `<${tag} class="${cls}"${attr}>${cb}<span class="t-body"><span class="t-title">${esc(it.title)}</span><span class="t-meta">${meta.join("")}</span></span>${due}</${tag}>`;
  if(it.checkable) return `<div class="task-wrap">${row}<button class="edit-btn" data-edit="${it.id}" aria-label="編集・移動">✎</button></div>`;

// 同じ週（日〜土）の他の日の未完了タスク
function restOfWeekHTML(d){
  const w = weeks.find(wk=>wk.dayIdxs.some(i=>days[i].date===d.date));
  if(!w) return "";
  const groups = [];
  w.dayIdxs.forEach(i=>{
    const dd = days[i];
    if(dd.date===d.date) return;
    const inc = items.filter(it=>it.date===dd.date && it.checkable && !state.completed[it.id]);
    if(inc.length) groups.push({dd, inc});
  });
  const body = groups.length
    ? groups.map(g=>`<div class="rest-date">${fmtMD(g.dd.date)}（${g.dd.weekday}）${g.dd.excluded?"・予定あり":""}</div>`+g.inc.map(it=>taskRowHTML(it)).join("")).join("")
    : '<div class="empty">🎉 今週の残りタスクはありません！</div>';
  return `<div class="card rest-week"><h2 class="section-h">今週のほかの日の残りタスク</h2>${body}</div>`;
}

function renderTodo(){

        <span class="log-when">${when}</span>
        <span class="log-act ${e.action==="done"?"done":"undo"}">${e.action==="done"?"完了":"取り消し"}</span>
        <span class="log-body">${esc(e.title)}<span class="sub">${esc(e.subject||"")}・予定日 ${fmtMD(e.taskDate)}</span></span>
      </div>`;
    }).join(""):'<div class="empty">まだ記録がありません。タスクにチェックを入れると記録されます。</div>'}
  </div>`;
}

/* ---- 編集シート（タイトル変更・日付移動・削除） ---- */
function renderSheet(){
  const root = document.getElementById("sheetRoot");
  if(!ui.sheet){ root.innerHTML=""; return; }
  const minD = days[0].date, maxD = days[days.length-1].date;
  if(ui.sheet.type==="item"){
    const it = itemById[ui.sheet.id];
    if(!it){ ui.sheet=null; root.innerHTML=""; return; }
    root.innerHTML = `<div class="sheet-backdrop" data-sheet-close></div>
    <div class="sheet" role="dialog" aria-label="タスクの編集">
      <div class="sheet-title">${esc(it.title)}</div>
      <div class="sheet-sub">${fmtMD(it.date)}（${it.weekday}）・${CAT_LABEL[it.category]}${it.custom?"・追加したタスク":""}</div>
      <button class="sheet-btn" data-sheet-rename>✎ タイトルを変更</button>
      <div class="sheet-move">
        <input type="date" id="moveDate" value="${it.date}" min="${minD}" max="${maxD}" aria-label="移動先の日付">
        <button class="sheet-btn primary" data-sheet-move>この日に移動</button>
      </div>
      ${it.custom?'<button class="sheet-btn danger" data-sheet-del>このタスクを削除</button>':""}
      <button class="sheet-btn" data-sheet-close>閉じる</button>
    </div>`;
  }else if(ui.sheet.type==="builtin"){
    const p = ui.sheet.id.split("|"); // "juku|date|subject" or "club|date"
    const label = p[0]==="juku" ? `塾：${p[2]}` : "部活：夏休み中の練習";
    root.innerHTML = `<div class="sheet-backdrop" data-sheet-close></div>
    <div class="sheet" role="dialog" aria-label="予定の削除">
      <div class="sheet-title">${esc(label)}</div>
      <div class="sheet-sub">${fmtMD(p[1])}（${weekdayOf(p[1])}）</div>
      <button class="sheet-btn danger" data-sheet-del>この日のこの予定を削除する</button>
      <div class="sheet-sub" style="margin:0">※削除した塾・部活の予定は「達成率」タブの要確認メモ下のボタンでまとめて元に戻せます</div>
      <button class="sheet-btn" data-sheet-close>閉じる</button>
    </div>`;
  }else{
    const s = state.customSched.find(x=>x.id===ui.sheet.id);
    if(!s){ ui.sheet=null; root.innerHTML=""; return; }
    root.innerHTML = `<div class="sheet-backdrop" data-sheet-close></div>
    <div class="sheet" role="dialog" aria-label="予定の編集">
      <div class="sheet-title">${esc(s.label)}${s.time?`　${esc(s.time)}`:""}</div>
      <div class="sheet-sub">${fmtMD(s.date)}（${weekdayOf(s.date)}）・追加した予定</div>
      <button class="sheet-btn" data-sheet-rename>✎ 内容を変更</button>
      <button class="sheet-btn" data-sheet-time>🕐 時間を変更</button>
      <div class="sheet-move">
        <input type="date" id="moveDate" value="${s.date}" min="${minD}" max="${maxD}" aria-label="移動先の日付">
        <button class="sheet-btn primary" data-sheet-move>この日に移動</button>
      </div>
      <button class="sheet-btn danger" data-sheet-del>この予定を削除</button>
      <button class="sheet-btn" data-sheet-close>閉じる</button>
    </div>`;
  }
}
function render(){
  renderHeader(); renderTabs();
  ({day:renderDay, week:renderWeek, todo:renderTodo, stats:renderStats, log:renderLog})[ui.tab]();
  renderSheet();
}

/* ================= events ================= */
document.addEventListener("click", ev=>{
  const t = ev.target.closest("[data-tab],[data-item],[data-nav],[data-goto-day],[data-filter],[data-oq-check],[data-oq-edit],[data-oq-del],[data-edit],[data-edit-sched],[data-edit-builtin],[data-sheet-close],[data-sheet-rename],[data-sheet-time],[data-sheet-move],[data-sheet-del]");
  if(!t) return;
  if(t.dataset.edit){ ui.sheet={type:"item", id:t.dataset.edit}; render(); return; }
  if(t.dataset.editSched){ ui.sheet={type:"sched", id:t.dataset.editSched}; render(); return; }
  if(t.dataset.editBuiltin){ ui.sheet={type:"builtin", id:t.dataset.editBuiltin}; render(); return; }
  if(t.dataset.sheetClose!==undefined){ ui.sheet=null; render(); return; }
  if(t.dataset.sheetRename!==undefined){ sheetRename(); return; }
  if(t.dataset.sheetTime!==undefined){ sheetTime(); return; }
  if(t.dataset.sheetMove!==undefined){ sheetMove(); return; }
  if(t.dataset.sheetDel!==undefined){ sheetDelete(); return; }
  if(t.dataset.tab){ ui.tab=t.dataset.tab; render(); window.scrollTo(0,0); return; }
  if(t.dataset.item){ toggleItem(t.dataset.item); return; }
  if(t.dataset.gotoDay!==undefined){ ui.dayIdx=+t.dataset.gotoDay; ui.tab="day"; render(); window.scrollTo(0,0); return; }
  if(t.dataset.filter){ ui.todoFilter=t.dataset.filter; render(); return; }
  if(t.dataset.oqCheck!==undefined){ const q=state.openQ[+t.dataset.oqCheck]; q.checked=!q.checked; save(); render(); return; }
  if(t.dataset.oqEdit!==undefined){
    const q=state.openQ[+t.dataset.oqEdit];
    const v=prompt("メモを編集", q.text);
    if(v!==null && v.trim()!==""){ q.text=v.trim(); save(); render(); }
    return;
  }
  if(t.dataset.oqDel!==undefined){
    if(confirm("このメモを削除しますか？")){ state.openQ.splice(+t.dataset.oqDel,1); save(); render(); }
    return;
  }
  switch(t.dataset.nav){
    case "day-prev": if(ui.dayIdx>0) ui.dayIdx--; render(); break;
    case "day-next": if(ui.dayIdx<days.length-1) ui.dayIdx++; render(); break;
    case "day-today": ui.dayIdx = clampTodayIdx(); render(); break;
    case "week-prev": if(ui.weekIdx>0) ui.weekIdx--; render(); break;
    case "week-next": if(ui.weekIdx<weeks.length-1) ui.weekIdx++; render(); break;
    case "toggle-review": state.includeReview=!state.includeReview; save(); render(); break;
    case "task-add-toggle": ui.addOpen=!ui.addOpen; render(); break;
    case "sched-add-toggle": ui.schedOpen=!ui.schedOpen; render(); break;
    case "sched-unhide": state.schedHidden={}; save(); render(); break;
    case "oq-add": {
      const v=prompt("メモを追加");
      if(v!==null && v.trim()!==""){ state.openQ.push({id:"q"+Date.now(), text:v.trim(), checked:false}); save(); render(); }
      break;
    }
  }
});
document.addEventListener("submit", ev=>{
  if(ev.target.id==="addTaskForm"){
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const title = String(fd.get("title")||"").trim();
    if(!title) return;
    const date = String(fd.get("date")||"") || days[ui.dayIdx].date;
    state.customTasks.push({
      id:"c|"+Date.now(), date,
      category:String(fd.get("category")||"school"),
      subject:String(fd.get("subject")||"").trim()||"その他",
      title, minutes:parseInt(String(fd.get("minutes")||""),10)||null
    });
    save(); buildItems();
    if(dayByDate[date]!==undefined) ui.dayIdx = dayByDate[date];
    ui.addOpen = false;
    render();
  }else if(ev.target.id==="addSchedForm"){
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const label = String(fd.get("label")||"").trim();
    if(!label) return;
    const date = String(fd.get("date")||"") || days[ui.dayIdx].date;
    state.customSched.push({id:"s|"+Date.now(), date, label, time:String(fd.get("time")||"").trim()});
    save();
    if(dayByDate[date]!==undefined) ui.dayIdx = dayByDate[date];
    ui.schedOpen = false;
    render();
  }
});
/* ---- 編集シートの各操作 ---- */
function sheetRename(){
  if(!ui.sheet) return;
  if(ui.sheet.type==="item"){
    const it = itemById[ui.sheet.id]; if(!it) return;
    const v = prompt("タイトルを変更", it.title);
    if(v!==null && v.trim()!==""){
      if(it.custom){ const c=state.customTasks.find(c=>c.id===it.id); if(c) c.title=v.trim(); }
      else state.overrides[it.id] = Object.assign({}, state.overrides[it.id], {title:v.trim()});
      save(); buildItems();
    }
  }else{
    const s = state.customSched.find(x=>x.id===ui.sheet.id); if(!s) return;
    const v = prompt("予定の内容を変更", s.label);
    if(v!==null && v.trim()!==""){ s.label=v.trim(); save(); }
  }
  ui.sheet=null; render();
}
function sheetTime(){
  if(!ui.sheet || ui.sheet.type!=="sched") return;
  const s = state.customSched.find(x=>x.id===ui.sheet.id); if(!s) return;
  const v = prompt("時間を変更（例：9:00〜12:00。空にすると時間なし）", s.time||"");
  if(v!==null){ s.time=v.trim(); save(); }
  ui.sheet=null; render();
}
function sheetMove(){
  if(!ui.sheet) return;
  const input = document.getElementById("moveDate");
  const v = input ? input.value : "";
  if(!v || dayByDate[v]===undefined){ alert("移動先は 夏休み期間内（7/19〜9/4）の日付を選んでください"); return; }
  if(ui.sheet.type==="item"){
    const it = itemById[ui.sheet.id]; if(!it) return;
    if(v!==it.date){
      if(it.custom){ const c=state.customTasks.find(c=>c.id===it.id); if(c) c.date=v; }
      else state.overrides[it.id] = Object.assign({}, state.overrides[it.id], {date:v});
      save(); buildItems();
    }
  }else{
    const s = state.customSched.find(x=>x.id===ui.sheet.id);
    if(s && v!==s.date){ s.date=v; save(); }
  }
  ui.sheet=null; render();
}
function sheetDelete(){
  if(!ui.sheet) return;
  if(ui.sheet.type==="builtin"){
    state.schedHidden[ui.sheet.id] = true;
    save(); ui.sheet=null; render();
    return;
  }
  if(ui.sheet.type==="item"){
    const it = itemById[ui.sheet.id];
    if(!it || !it.custom) return;
    if(!confirm("この追加タスクを削除しますか？")) return;
    state.customTasks = state.customTasks.filter(c=>c.id!==it.id);
    delete state.completed[it.id];
    save(); buildItems();
  }else{
    if(!confirm("この予定を削除しますか？")) return;
    state.customSched = state.customSched.filter(x=>x.id!==ui.sheet.id);
    save();
  }
  ui.sheet=null; render();
}
function clampTodayIdx(){
  const t=todayStr();
  if(dayByDate[t]!==undefined) return dayByDate[t];
  return t<days[0].date ? 0 : days.length-1;
}

/* ================= init ================= */
buildItems();
ui.dayIdx = clampTodayIdx();
ui.weekIdx = Math.max(0, weeks.findIndex(w=>w.dayIdxs.includes(ui.dayIdx)));
render();
</script>
